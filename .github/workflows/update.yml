name: Asia Air Data Update

on:
  schedule:
    - cron: '*/60 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 프로젝트 확장에 필요한 라이브러리들을 미리 명시 (requests 등 추가)
          pip install FlightRadarAPI beautifulsoup4 requests pandas

      - name: Run Scraper
        # 파일명이 scraper.py가 맞는지 꼭 확인하세요!
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # 변경사항 확인 및 커밋
          git add .  # data.js뿐만 아니라 혹시 바뀔지 모를 파일 전체 포함
          
          # 변경사항이 있을 때만 커밋 진행
          if ! git diff --staged --quiet; then
            git commit -m "Update Asia flight data $(date)"
            
            # 충돌 방지: 원격의 변경사항을 가져와 내 변경사항을 그 위에 쌓음 (rebase)
            # --force 대신 rebase를 쓰는 것이 장기적으로 리포지토리 꼬임을 방지합니다.
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
