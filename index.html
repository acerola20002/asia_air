<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아시아 실시간 항공 전광판</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* 국가/공항 선택 버튼 스타일 */
        .selector-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { 
            padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; background: #333; color: #ccc;
        }
        button.active { background: #007bff; color: white; box-shadow: 0 0 10px rgba(0,123,255,0.5); }
        button:hover { background: #444; }

        /* 전광판 표 스타일 */
        .board-card { background: #252525; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #ffcc00; margin-top: 0; }
        .update-time { text-align: right; font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #333; color: #aaa; padding: 12px; font-size: 0.9rem; text-align: center; }
        td { padding: 12px; border-bottom: 1px solid #333; text-align: center; font-size: 0.95rem; }
        
        /* 상태별 색상 */
        .status-출발완료, .status-도착완료 { color: #888; }
        .status-탑승중, .status-도착예정 { color: #28a745; font-weight: bold; }
        .status-지연 { color: #ff4444; font-weight: bold; }
        .status-탑승곧마감 { color: #ffcc00; font-weight: bold; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }
        @media (max-width: 600px) { th, td { padding: 8px; font-size: 0.8rem; } }
    </style>
</head>
<body>

<div class="container">
    <div id="country-buttons" class="selector-group"></div>
    
    <div id="airport-buttons" class="selector-group"></div>

    <div class="board-card">
        <div id="update-info" class="update-time"></div>
        <h2 id="board-title">국가를 선택해주세요</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>구분</th>
                        <th>시간</th>
                        <th>편명</th>
                        <th>도시</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody id="flight-data">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="data.js"></script>
