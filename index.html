<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아시아 실시간 항공 전광판</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #000; color: white; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        .logo-title { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .logo-icon { font-size: 2.5rem; }
        h1 { color: #ffcc00; margin: 0; font-size: 2.2rem; font-weight: 800; }
        .update-info { color: #aaa; font-size: 1rem; margin-bottom: 8px; }
        .time-notice { color: #ff3333; font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; }
        .info-box { border: 1px solid #333; padding: 20px; border-radius: 4px; font-size: 0.95rem; color: #ccc; margin-bottom: 40px; line-height: 1.7; text-align: center; background-color: #0a0a0a; }
        .group-label { display: block; text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 12px; font-weight: bold; }
        .selector-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        button { padding: 10px 18px; border: 1px solid #333; border-radius: 6px; cursor: pointer; font-weight: 600; background: #111; color: #777; transition: 0.3s; }
        button.active { background: #00d2ff; color: #000; border-color: #00d2ff; }
        .filter-btn { width: 150px; height: 60px; }
        .filter-btn.active { background: #ffcc00; color: #000; border-color: #ffcc00; }
        .board-card { background: #111; border-radius: 12px; padding: 20px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1a1a; color: #888; padding: 10px; border-bottom: 2px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; text-align: center; }
        .status-출발완료, .status-도착완료 { color: #555; }
        .status-탑승중, .status-도착예정 { color: #2ecc71; font-weight: bold; }
        .status-지연 { color: #e74c3c; font-weight: bold; }
        .status-탑승곧마감 { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-title">
            <span class="logo-icon">✈️</span>
            <h1>ASIA INTERNATIONAL</h1>
        </div>
        <div id="update-text" class="update-info">※ 마지막 업데이트: 확인 중...</div>
        <div id="dynamic-notice" class="time-notice">(각 국가 현지 시간 기준)</div>
    </header>

    <div class="info-box">
        ⚠️ 본 전광판은 참고용입니다. 데이터 업데이트 간격으로 인해 실제 정보와 차이가 있을 수 있으니 항공사 확인 필수입니다.
    </div>

    <span class="group-label">국가 선택 / REGION</span>
    <div id="country-buttons" class="selector-group"></div>
    
    <span class="group-label">공항 선택 / AIRPORT</span>
    <div id="airport-buttons" class="selector-group"></div>

    <span class="group-label">출발·도착 필터 / FILTER</span>
    <div class="selector-group">
        <button onclick="filterType('도착', this)" class="filter-btn active">도착 ARRIVAL</button>
        <button onclick="filterType('출발', this)" class="filter-btn">출발 DEPARTURE</button>
    </div>

    <div class="board-card">
        <h2 id="board-title">데이터를 불러오는 중...</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>구분</th>
                        <th>시간</th>
                        <th>편명</th>
                        <th>도시</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody id="flight-data"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="data.js"></script>

<script>
// 공항 코드 변환용
const airportNames = {
    "NRT": "나리타", "KIX": "간사이", "FUK": "후쿠오카", "CTS": "삿포로", "HND": "하네다", "OKA": "오키나와",
    "CXR": "나트랑", "DAD": "다낭", "PQC": "푸꾸옥", "HAN": "하노이", "SGN": "호치민", "HPH": "하이퐁",
    "BKK": "방콕", "DMK": "돈무앙", "CNX": "치앙마이", "HKT": "푸켓",
    "TPE": "타이베이", "KHH": "가오슝", "TSA": "송산",
    "MNL": "마닐라", "CEB": "세부", "MPH": "보라카이", "TAG": "보홀",
    "PVG": "상하이", "PEK": "베이징", "TAO": "칭다오", "CAN": "광저우"
};

// 시차 설정
const countryOffsets = { "일본": 9, "베트남": 7, "태국": 7, "대만": 8, "필리핀": 8, "중국": 8 };

let currentCountry = "";
let currentAirport = "";
let currentType = "도착";

// 파이썬 UTC 시간을 현지 시간으로 변환하는 핵심 함수
function formatTimeWithOffset(utcStr, offset) {
    if (!utcStr) return "확인 불가";
    // 파이썬의 "2026-04-16 12:11:06"을 ISO 규격 "2026-04-16T12:11:06Z"로 변환
    const isoStr = utcStr.replace(" ", "T") + "Z";
    const date = new Date(isoStr);

    // UTC 기준 시간에 시차(offset)를 더함
    date.setUTCHours(date.getUTCHours() + offset);

    const m = String(date.getUTCMonth() + 1).padStart(2, '0');
    const d = String(date.getUTCDate()).padStart(2, '0');
    const h = String(date.getUTCHours()).padStart(2, '0');
    const min = String(date.getUTCMinutes()).padStart(2, '0');

    return `${m}/${d} ${h}:${min}`;
}

function init() {
    if (typeof flightInfo === 'undefined') return;
    const countries = Object.keys(flightInfo.allData);
    const countryDiv = document.getElementById('country-buttons');

    countries.forEach(country => {
        const btn = document.createElement('button');
        btn.innerText = country;
        btn.onclick = () => selectCountry(country, btn);
        countryDiv.appendChild(btn);
    });

    if (countries.length > 0) countryDiv.firstChild.click();
}

function selectCountry(country, btn) {
    currentCountry = country;
    const offset = countryOffsets[country] || 9;

    // 업데이트 시간 현지화 계산 후 출력
    const localUpdate = formatTimeWithOffset(flightInfo.lastUpdateUTC, offset);
    document.getElementById('update-text').innerText = `※ 마지막 업데이트: ${localUpdate}`;

    document.querySelectorAll('#country-buttons button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const airportDiv = document.getElementById('airport-buttons');
    airportDiv.innerHTML = "";
    const airports = Object.keys(flightInfo.allData[country]);

    airports.forEach(code => {
        const abtn = document.createElement('button');
        abtn.innerText = airportNames[code] || code; // 코드 대신 한글 이름 출력
        abtn.onclick = () => {
            currentAirport = code;
            renderBoard();
            document.querySelectorAll('#airport-buttons button').forEach(b => b.classList.remove('active'));
            abtn.classList.add('active');
        };
        airportDiv.appendChild(abtn);
    });

    if (airports.length > 0) airportDiv.firstChild.click();
}

function filterType(type, btn) {
    currentType = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderBoard();
}

function renderBoard() {
    const tbody = document.getElementById('flight-data');
    const flights = flightInfo.allData[currentCountry][currentAirport].filter(f => f.type === currentType);

    document.getElementById('board-title').innerText = `${currentCountry} - ${airportNames[currentAirport] || currentAirport}`;

    if (flights.length === 0) {
        tbody.innerHTML = "<tr><td colspan='5'>표시할 데이터가 없습니다.</td></tr>";
        return;
    }

    tbody.innerHTML = flights.map(f => `
        <tr>
            <td style="color: ${f.type === '출발' ? '#3498db' : '#f1c40f'}">${f.type}</td>
            <td>${f.time}</td>
            <td style="font-family: monospace; font-weight: bold;">${f.flight}</td>
            <td>${f.city}</td>
            <td class="status-${f.status.replace(/\s+/g,'')}">${f.status}</td>
        </tr>
    `).join('');
}

window.onload = init;
</script>
</body>
</html>
